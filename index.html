<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Task | Age Calculator | CodeAlpha</title>
    <!-- Google font used for the page typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Main stylesheet for layout, colors, and responsive design -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Page wrapper that centers the card in the viewport -->
    <div class="main-wrapper">
        <div class="hero-card">
            <!-- Header section with the main title and user instructions -->
            <header>
                <h1>Age <span>Calculator</span></h1>
                <p>Enter your birth date to calculate your age </p>
            </header>
            
            <!-- Input controls for selecting a date and triggering the calculation -->
            <div class="input-section">
                <input type="date" id="dateInput">
                <button type="button" id="calcBtn">Analyze</button>
            </div>

            <!-- Result container initially hidden; shown after calculation -->
            <div id="result" class="result-container hidden">
                <h3>Calculated Age:</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span id="years">0</span>
                        <label>Years</label>
                    </div>
                    <div class="stat-card">
                        <span id="months">0</span>
                        <label>Months</label>
                    </div>
                    <div class="stat-card">
                        <span id="days">0</span>
                        <label>Days</label>
                    </div>
                </div>

                <!-- Additional calculated insights displayed after age computation -->
                <div class="extra-insights">
                    <div class="insight-item">
                        <h4>Zodiac Sign</h4>
                        <div id="zodiacOutput" class="highlight-gold">--</div>
                    </div>
                    <div class="insight-item">
                        <h4>Next Birthday In</h4>
                        <div id="birthdayCountdown" class="highlight-red">--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- JavaScript file handles the age calculation logic and UI updates -->
    <script src="script.js"></script>
</body>
</html>
